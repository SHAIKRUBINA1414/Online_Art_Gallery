name: CI and Optional Deploy

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile app.py

  build_and_publish_image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest

  optional_deploy_render:
    runs-on: ubuntu-latest
    needs: build_and_publish_image
    if: ${{ secrets.RENDER_SERVICE_ID && secrets.RENDER_API_KEY }}
    steps:
      - name: Deploy to Render (if configured)
        uses: render-examples/render-deploy@v1
        with:
          api_key: ${{ secrets.RENDER_API_KEY }}
          service_id: ${{ secrets.RENDER_SERVICE_ID }}

  optional_deploy_heroku:
    runs-on: ubuntu-latest
    needs: build_and_publish_image
    if: ${{ secrets.HEROKU_API_KEY && secrets.HEROKU_APP_NAME }}
    steps:
      - name: Deploy to Heroku Container Registry
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          docker_image_name: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest

<article class="art-card">
  <a href="{{ url_for('artwork_detail', artwork_id=art.id) }}">
    <img src="{{ url_for('static', filename='uploads/' ~ art.image_filename) }}" alt="{{ art.title }}">
    <div class="art-overlay">
      <h3>{{ art.title }}</h3>
      <p>{{ art.category }} · {{ art.medium }}</p>
      <span>{{ art.likes|length }} ♥</span>
    </div>
  </a>
  {% if current_user.is_authenticated %}
    <form method="post" action="{{ url_for('like_artwork', artwork_id=art.id) }}" class="heart-form">
      <button type="submit" aria-label="Like artwork">♥</button>
    </form>
  {% else %}
    <a class="heart-form heart-link" href="{{ url_for('login') }}" aria-label="Login to like">♥</a>
  {% endif %}
</article>

{% extends "base.html" %}
{% block title %}Sign up | Ru's Art Vault{% endblock %}
{% block breadcrumbs %}
<nav class="container breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ url_for('index') }}">Home</a><span class="sep" aria-hidden="true">/</span><span aria-current="page">Sign up</span>
</nav>
{% endblock %}
{% block content %}
<section class="auth-shell">
  <form class="auth-card" method="post">
    <h1>Create account</h1>
    <label>Username<input class="form-control" name="username" required></label>
    <label>Email<input class="form-control" type="email" name="email" required></label>
    <label>Password<input class="form-control" type="password" name="password" minlength="6" required></label>
    <button class="btn btn-dark w-100" type="submit">Sign up</button>
    <p>Already registered? <a href="{{ url_for('login') }}">Login</a></p>
  </form>
</section>
{% endblock %}
